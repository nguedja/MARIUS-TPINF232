{% extends "base.html" %}

{% block content %}

<style>
/* =========================
   🌈 FOND GRADIENT ANIMÉ
========================= */

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -3;

    background: linear-gradient(-45deg,
        #00c6ff
    );

    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* =========================
   ✨ PARTICULES
========================= */

.particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -2;
    overflow: hidden;
}

.particles span {
    position: absolute;
    display: block;
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: float 10s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh) scale(0);}
    100% {transform: translateY(-10vh) scale(1);}
}

/* =========================
   CONTENU
========================= */

.home-container {
    text-align: center;
    margin-top: 80px;
    position: relative;
    z-index: 2;
    color: white;
}

/* =========================
   LOGO ANIMÉ
========================= */

.logo {
    font-size: 55px;
    font-weight: bold;
    margin-bottom: 20px;
    animation: pulse 2s infinite;
    text-shadow: 0 0 20px rgba(0,255,255,0.7);
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.1);}
    100% {transform: scale(1);}
}

/* =========================
   TEXTE
========================= */

.typed-text {
    font-size: 18px;
    white-space: pre-line;
    min-height: 250px;
    line-height: 1.6;
    text-shadow: 0 0 10px rgba(0,0,0,0.6);
}

/* =========================
   BOUTON
========================= */

.btn-continue {
    margin-top: 25px;
    padding: 12px 28px;
    border-radius: 30px;
    font-weight: bold;
    background: linear-gradient(45deg,#00c6ff,#0072ff);
    border: none;
    color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.btn-continue:hover {
    transform: scale(1.08);
}

/* =========================
   PARTICULES POSITION
========================= */
.particles span:nth-child(1){left:10%; animation-duration:8s;}
.particles span:nth-child(2){left:20%; animation-duration:12s;}
.particles span:nth-child(3){left:30%; animation-duration:10s;}
.particles span:nth-child(4){left:40%; animation-duration:14s;}
.particles span:nth-child(5){left:50%; animation-duration:9s;}
.particles span:nth-child(6){left:60%; animation-duration:11s;}
.particles span:nth-child(7){left:70%; animation-duration:13s;}
.particles span:nth-child(8){left:80%; animation-duration:7s;}
.particles span:nth-child(9){left:90%; animation-duration:15s;}

</style>

<!-- PARTICULES -->
<div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
</div>

<div class="home-container">

    <!-- LOGO ANIMÉ -->
    <div class="logo">🎓 AI EDUFEEDBACK</div>

    <!-- TEXTE -->
    <p id="typed-text" class="typed-text"></p>

    <!-- BOUTON -->
    <a href="/form" class="btn btn-continue">
        ▶ Cliquer pour continuer
    </a>

</div>

<!-- TYPEWRITER -->
<script>
const text = `Bienvenue sur la plateforme d'analyse statistique des performances pédagogiques.

Cette application permet aux étudiants d'évaluer objectivement la qualité des enseignements au sein de la Faculté des Sciences.

Les données collectées sont analysées à l'aide de méthodes statistiques avancées, incluant l'analyse de distribution, la corrélation et la régression linéaire.

Les résultats sont visualisés sous forme de graphiques dynamiques permettant une interprétation claire et rapide des tendances.

Vous allez ensuite recevoir un formulaire à compléter. Les informations fournies seront automatiquement analysées afin de produire des indicateurs fiables sur la qualité de l’enseignement et la performance des enseignants.

Cette plateforme constitue un outil d’aide à la décision basé sur des données réelles, contribuant à l’amélioration continue du système éducatif.`;

let i = 0;
const speed = 25;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typed-text").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

window.onload = typeWriter;
</script>

{% endblock %}
